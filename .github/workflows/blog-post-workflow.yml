name: Latest blog post workflow

on:
  schedule:
    # 매일 00:00 UTC (한국시간 09:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest zerry.co.kr posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull in blog posts from zerry.co.kr
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://zerry.co.kr/feed.xml"
          max_post_count: 5
          template: "- [$title]($url) <sub>$date</sub>"
          date_format: "yyyy-MM-dd"
          commit_message: "chore: 최근 블로그 글 자동 동기화"
